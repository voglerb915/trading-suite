<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Trading Cockpit</title>
    <link rel="stylesheet" href="/apps/cockpit/css/cockpit.css">
</head>

<body>

<header id="topbar">
    <div class="logo">Trading Cockpit</div>

    <nav id="main-nav">
        <a href="#" data-tool="cockpit">Cockpit</a>
        <a href="#" data-tool="lab">Lab</a>
        <a href="#" data-tool="dashboard">Dashboard (Current)</a> 
        <a href="#" data-tool="new-dashboard">New Dashboard</a>
        
        <a href="#" data-tool="journal">Journal</a>
        <a href="#" data-tool="charting">Charting</a>

        <!-- NEU: Excel -->
        <a href="#" data-tool="excel">Excel</a>

        <a href="#" data-tool="control">Control-Center</a>
    </nav>
</header>

<main id="content">

    <!-- ⭐ NATIVES COCKPIT-UI -->
    <div id="cockpit-ui" class="tool-view">
        <div id="cockpit-grid">

            <!-- ⭐ Cockpit Widgets -->
            <div id="cockpit-header"></div>
            <div id="cockpit-top20"></div>
            <div id="cockpit-index-performance"></div>
            <div id="cockpit-sectors"></div>

        </div>
    </div>

    <!-- ⭐ IFRAME-TOOLS -->
    <iframe id="iframe-lab" src="/apps/lab/index.html" class="tool-iframe"></iframe>
    <iframe id="iframe-dashboard" src="http://localhost:3000" class="tool-iframe active"></iframe>
    <iframe id="iframe-new-dashboard" src="/apps/dashboard/index.html" class="tool-iframe"></iframe>
    <iframe id="iframe-journal" src="/apps/journal/index.html" class="tool-iframe"></iframe>
    <iframe id="iframe-charting" src="/apps/charting-tool/index.html" class="tool-iframe"></iframe>

    <!-- NEU: Excel -->
    <iframe id="iframe-excel" src="/apps/excel/index.html" class="tool-iframe"></iframe>

    <iframe id="iframe-control" src="/apps/control-center/index.html" class="tool-iframe"></iframe>

</main>

<!-- ⭐ WICHTIG: Cockpit-Controller -->
<script type="module" src="/apps/cockpit/cockpit.js"></script>

<!-- ⭐ NEU: Cockpit-Renderer -->
<script type="module" src="/apps/cockpit/js/renderCockpit.js"></script>

</body>
</html>
