<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Lab</title>

    <!-- Basis-LAB -->
    <link rel="stylesheet" href="/apps/lab/css/lab.css">

    <!-- Volume Modul -->
    <link rel="stylesheet" href="/apps/lab/css/volume.css">

    <!-- Excel Matrix Styles -->
    <link rel="stylesheet" href="/apps/lab/css/excel.css">
</head>


<body style="background: #121212;">

    <div id="lab-container">

        <div id="col-1"></div>   <!-- 25vw -->
        <div id="col-2"></div>   <!-- 10vw -->
        <div id="col-3">

            <!-- SQL-Status Widget bleibt ganz oben -->
            <div id="sql-status-root"></div>

            <!-- Tabs -->
            <div class="excel-tabs">
                <button class="tab-btn active" data-tab="performance">Performance</button>
                <button class="tab-btn" data-tab="ranking">Ranking</button>
                <button class="tab-btn" data-tab="sparkline">Sectors</button>
                <button class="tab-btn" data-tab="excel">Industries</button>
            </div>

            <!-- Tab-Inhalte -->
            <div id="tab-performance" class="tab-content"></div>
            <div id="tab-ranking" class="tab-content" style="display:none;"></div>
            <div id="tab-sparkline" class="tab-content" style="display:none;"></div>
            <div id="tab-excel" class="tab-content" style="display:none;"></div>

        </div>


    <script type="module" src="/apps/lab/lab.js"></script>

</body>
</html>
